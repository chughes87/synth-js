<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>synth-js</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div id="rack">
    <div id="module-panels"></div>

    <div class="module module-wide" id="module-picker-panel">
      <h2>Patch Builder</h2>
      <div class="picker-row">
        <select id="module-select"></select>
        <button id="module-add-btn">Add</button>
        <select id="preset-select">
          <option value="">Load Preset...</option>
          <option value="subtractive">Subtractive</option>
          <option value="fm">FM-ish</option>
          <option value="noisepad">Noise Pad</option>
          <option value="sequenced">Sequenced</option>
        </select>
      </div>
    </div>

    <div class="module module-wide" id="patch-viz-panel">
      <h2>Patch View</h2>
      <canvas id="patch-viz-canvas"></canvas>
    </div>

    <div class="module module-wide" id="signal-patch-panel">
      <h2>Signal Routing</h2>
    </div>

    <div class="module module-wide" id="mod-patch-panel">
      <h2>Mod Routing</h2>
    </div>

    <div class="module module-wide" id="visualizer-panel">
      <h2>Scope</h2>
      <canvas id="visualizer-canvas"></canvas>
    </div>
  </div>

  <div id="transport">
    <button id="start-btn">Start</button>
    <button id="stop-btn" disabled>Stop</button>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
