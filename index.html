<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>synth-js</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div id="rack">
    <div class="module" id="oscillator-panel">
      <h2>Oscillator</h2>
      <label>
        Frequency
        <input type="range" id="osc-frequency" min="20" max="2000" value="440" step="1">
        <span id="osc-frequency-value">440 Hz</span>
      </label>
      <label>
        Waveform
        <select id="osc-type">
          <option value="sine">Sine</option>
          <option value="square">Square</option>
          <option value="sawtooth">Sawtooth</option>
          <option value="triangle">Triangle</option>
        </select>
      </label>
    </div>

    <div class="module" id="noise-panel">
      <h2>Noise</h2>
      <label>
        <input type="checkbox" id="noise-enabled">
        Enable white noise
      </label>
    </div>

    <div class="module" id="envelope-panel">
      <h2>Envelope</h2>
      <label>
        <input type="checkbox" id="env-enabled">
        Enable ADSR
      </label>
      <label>
        Attack
        <input type="range" id="env-attack" min="0.001" max="1" value="0.01" step="0.001">
        <span id="env-attack-value">0.01 s</span>
      </label>
      <label>
        Decay
        <input type="range" id="env-decay" min="0.01" max="1" value="0.1" step="0.01">
        <span id="env-decay-value">0.1 s</span>
      </label>
      <label>
        Sustain
        <input type="range" id="env-sustain" min="0" max="1" value="0.7" step="0.01">
        <span id="env-sustain-value">0.70</span>
      </label>
      <label>
        Release
        <input type="range" id="env-release" min="0.01" max="2" value="0.3" step="0.01">
        <span id="env-release-value">0.3 s</span>
      </label>
    </div>

    <div class="module" id="filter-panel">
      <h2>Filter</h2>
      <label>
        Type
        <select id="filter-type">
          <option value="lowpass">Lowpass</option>
          <option value="highpass">Highpass</option>
          <option value="bandpass">Bandpass</option>
          <option value="notch">Notch</option>
        </select>
      </label>
      <label>
        Frequency
        <input type="range" id="filter-frequency" min="20" max="10000" value="350" step="1">
        <span id="filter-frequency-value">350 Hz</span>
      </label>
      <label>
        Q
        <input type="range" id="filter-q" min="0.1" max="20" value="1" step="0.1">
        <span id="filter-q-value">1.0</span>
      </label>
    </div>

    <div class="module" id="lfo-panel">
      <h2>LFO</h2>
      <label>
        <input type="checkbox" id="lfo-enabled">
        Modulate osc frequency
      </label>
      <label>
        Waveform
        <select id="lfo-type">
          <option value="sine">Sine</option>
          <option value="square">Square</option>
          <option value="sawtooth">Sawtooth</option>
          <option value="triangle">Triangle</option>
        </select>
      </label>
      <label>
        Rate
        <input type="range" id="lfo-rate" min="0.1" max="30" value="5" step="0.1">
        <span id="lfo-rate-value">5.0 Hz</span>
      </label>
      <label>
        Depth
        <input type="range" id="lfo-depth" min="0" max="500" value="100" step="1">
        <span id="lfo-depth-value">100</span>
      </label>
    </div>

    <div class="module" id="delay-panel">
      <h2>Delay</h2>
      <label>
        <input type="checkbox" id="delay-enabled">
        Enable delay
      </label>
      <label>
        Time
        <input type="range" id="delay-time" min="0.01" max="1.5" value="0.3" step="0.01">
        <span id="delay-time-value">0.30 s</span>
      </label>
      <label>
        Feedback
        <input type="range" id="delay-feedback" min="0" max="0.95" value="0.3" step="0.01">
        <span id="delay-feedback-value">0.30</span>
      </label>
    </div>

    <div class="module module-wide" id="sequencer-panel">
      <h2>Sequencer</h2>
      <label>
        Tempo
        <input type="range" id="seq-bpm" min="40" max="300" value="120" step="1">
        <span id="seq-bpm-value">120 BPM</span>
      </label>
      <div id="sequencer-grid"></div>
    </div>

    <div class="module" id="output-panel">
      <h2>Output</h2>
      <label>
        Volume
        <input type="range" id="output-volume" min="0" max="1" value="0.5" step="0.01">
        <span id="output-volume-value">0.5</span>
      </label>
    </div>
  </div>

  <div id="transport">
    <button id="start-btn">Start</button>
    <button id="stop-btn" disabled>Stop</button>
    <button id="seq-play-btn">Seq Play</button>
    <button id="seq-stop-btn" disabled>Seq Stop</button>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
